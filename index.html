<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lekhoni - Typing Practice</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for the page background and font */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #63A169; /* Page background color */
            transition: background-color 0.3s ease;
        }
        /* Dark mode styles */
        body.dark-mode {
            background-color: #1a202c; /* Dark background */
            color: #e2e8f0; /* Light text */
        }
        body.grey-mode {
            background-color: #cccccc; /* Grey background */
            color: #333333; /* Darker text */
        }
        /* Specific styles for the passage and typing area to ensure auto-scroll and minimum height */
        #passage-display, #typing-input {
            overflow-y: auto; /* Enable vertical scrolling */
            white-space: pre-wrap; /* Preserve whitespace and wrap text */
            word-wrap: break-word; /* Break long words */
            line-height: 1.5; /* Improve readability */
        }
        /* Timer flashing animation */
        @keyframes timer-flash {
            0% { color: red; transform: scale(1); }
            50% { color: #ff6347; transform: scale(1.1); }
            100% { color: red; transform: scale(1); }
        }
        .timer-flashing {
            animation: timer-flash 0.8s infinite alternate;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <div class="container mx-auto p-4 flex-grow">
        <!-- Welcome Banner -->
        <h1 class="text-center text-red-600 text-5xl font-bold mb-8 rounded-lg p-4 bg-white bg-opacity-90 shadow-lg">
            WELCOME TO LEKHONI
        </h1>

        <!-- Main Content Area -->
        <div class="bg-white bg-opacity-90 p-8 rounded-xl shadow-lg mb-8">
            <!-- Language and Time Settings -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                <!-- Language Selection -->
                <div>
                    <label for="language-select" class="block text-gray-700 text-lg font-semibold mb-2">Select Language:</label>
                    <select id="language-select" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 text-lg">
                        <option value="english">English</option>
                        <option value="bangla">বাংলা</option>
                    </select>
                </div>

                <!-- Typing Time Setting -->
                <div>
                    <label for="time-select" class="block text-gray-700 text-lg font-semibold mb-2">Set Typing Time:</label>
                    <select id="time-select" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 text-lg">
                        <option value="1">1 Minute</option>
                        <option value="2">2 Minutes</option>
                        <option value="3">3 Minutes</option>
                        <option value="5">5 Minutes</option>
                        <option value="10">10 Minutes</option>
                        <option value="15">15 Minutes</option>
                    </select>
                </div>

                <!-- Page Color Settings -->
                <div>
                    <label class="block text-gray-700 text-lg font-semibold mb-2">Page Color:</label>
                    <div class="flex space-x-4">
                        <label class="inline-flex items-center">
                            <input type="radio" name="page-color" value="normal" checked class="form-radio h-5 w-5 text-green-600">
                            <span class="ml-2 text-gray-800 text-lg">Normal</span>
                        </label>
                        <label class="inline-flex items-center">
                            <input type="radio" name="page-color" value="grey" class="form-radio h-5 w-5 text-gray-600">
                            <span class="ml-2 text-gray-800 text-lg">Grey</span>
                        </label>
                        <label class="inline-flex items-center">
                            <input type="radio" name="page-color" value="dark" class="form-radio h-5 w-5 text-blue-600">
                            <span class="ml-2 text-gray-800 text-lg">Dark Mode</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Passage Selection -->
            <div class="mb-8">
                <label for="passage-select" class="block text-gray-700 text-lg font-semibold mb-2">Select Passage:</label>
                <select id="passage-select" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 text-lg">
                    <!-- Options will be dynamically loaded by JavaScript -->
                </select>
            </div>

            <!-- Instructions and Timer -->
            <div class="text-center mb-6">
                <p id="start-typing-message" class="text-xl text-gray-600 font-medium mb-4">You can start typing, the timer will begin when you press the first key.</p>
                <div id="timer-display" class="text-5xl font-extrabold text-green-700 mb-4">00:00</div>
            </div>

            <!-- Passage Display Area -->
            <div class="mb-8 p-6 bg-gray-100 border border-gray-300 rounded-lg shadow-inner" style="min-height: 150px;">
                <p id="passage-display" class="text-lg text-gray-800"></p>
            </div>

            <!-- Typing Input Area -->
            <div class="mb-8">
                <label for="typing-input" class="block text-gray-700 text-lg font-semibold mb-2">Start Typing Here:</label>
                <textarea id="typing-input" class="w-full p-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 text-lg resize-y" rows="5" placeholder="Type the passage here..."></textarea>
            </div>

            <!-- Results and Wrong Words -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="p-6 bg-blue-100 border border-blue-300 rounded-lg shadow-inner">
                    <h3 class="text-xl font-semibold text-blue-800 mb-4">Results:</h3>
                    <p class="text-lg text-blue-700 mb-2">Gross WPM: <span id="gross-wpm" class="font-bold">0</span></p>
                    <p class="text-lg text-blue-700">Net WPM: <span id="net-wpm" class="font-bold">0</span></p>
                </div>
                <div class="p-6 bg-red-100 border border-red-300 rounded-lg shadow-inner">
                    <h3 class="text-xl font-semibold text-red-800 mb-4">Wrong Words:</h3>
                    <div id="wrong-words-display" class="text-lg text-red-700">None</div>
                </div>
            </div>

            <!-- Control Toggles -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <label class="inline-flex items-center p-3 bg-gray-100 rounded-lg shadow-sm cursor-pointer">
                    <input type="checkbox" id="backspace-toggle" class="form-checkbox h-5 w-5 text-green-600 rounded">
                    <span class="ml-2 text-gray-700 text-lg">Backspace On/Off</span>
                </label>
                <label class="inline-flex items-center p-3 bg-gray-100 rounded-lg shadow-sm cursor-pointer">
                    <input type="checkbox" id="autoscroll-toggle" checked class="form-checkbox h-5 w-5 text-green-600 rounded">
                    <span class="ml-2 text-gray-700 text-lg">Auto Scroll On/Off</span>
                </label>
                <label class="inline-flex items-center p-3 bg-gray-100 rounded-lg shadow-sm cursor-pointer">
                    <input type="checkbox" id="highlight-toggle" checked class="form-checkbox h-5 w-5 text-green-600 rounded">
                    <span class="ml-2 text-gray-700 text-lg">Wrong Word Highlight On/Off</span>
                </label>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-wrap justify-center gap-4 mb-8">
                <button id="restart-button" class="px-6 py-3 bg-green-600 text-white font-bold rounded-lg shadow-md hover:bg-green-700 transition duration-300 ease-in-out transform hover:scale-105">
                    Restart Test
                </button>
                <button id="copy-typed-text-button" class="px-6 py-3 bg-blue-600 text-white font-bold rounded-lg shadow-md hover:bg-blue-700 transition duration-300 ease-in-out transform hover:scale-105">
                    Copy Typed Text
                </button>
            </div>

            <!-- Complaint Box -->
            <div class="mb-8 p-6 bg-yellow-100 border border-yellow-300 rounded-lg shadow-inner">
                <h3 class="text-xl font-semibold text-yellow-800 mb-4">Complaint Box:</h3>
                <textarea id="complaint-box" class="w-full p-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-500 text-lg resize-y" rows="4" placeholder="Have a complaint or suggestion? Let us know!"></textarea>
                <button class="mt-4 px-6 py-3 bg-yellow-600 text-white font-bold rounded-lg shadow-md hover:bg-yellow-700 transition duration-300 ease-in-out transform hover:scale-105">
                    Submit Complaint
                </button>
            </div>

            <!-- Account Creation Placeholder -->
            <div class="p-6 bg-purple-100 border border-purple-300 rounded-lg shadow-inner text-center">
                <h3 class="text-xl font-semibold text-purple-800 mb-4">Account:</h3>
                <p class="text-lg text-purple-700 mb-4">Create an account to save your progress and access more features!</p>
                <button class="px-6 py-3 bg-purple-600 text-white font-bold rounded-lg shadow-md hover:bg-purple-700 transition duration-300 ease-in-out transform hover:scale-105">
                    Create Account / Login
                </button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white text-center p-4 mt-auto rounded-t-lg">
        <p class="text-sm">&copy; COPYRIGHT 2025 - LEKHONI ALL RIGHTS RESERVED</p>
    </footer>

        // Typing Test State Variables
        let timerInterval = null;
        let timeLeft = 0;
        let totalTime = 0; // In seconds
        let isTypingStarted = false;
        let currentPassage = '';

        // Passages (25 English, 25 Bangla)

            english: [
                "Albert Einstein was a German-born theoretical physicist who developed the theory of relativity, one of the two pillars of modern physics. His work is also known for its influence on the philosophy of science. He is best known by the general public for his mass–energy equivalence formula E = mc2, which has been dubbed 'the world's most famous equation'.",
                "Marie Curie was a Polish and naturalized French physicist and chemist who conducted pioneering research on radioactivity. She was the first woman to win a Nobel Prize, the first person and only woman to win the Nobel Prize twice, and the only person to win the Nobel Prize in two different scientific fields.",
                "Nelson Mandela was a South African anti-apartheid revolutionary, political leader, and philanthropist who served as the first President of South Africa from 1994 to 1999. He was the country's first black head of state and the first elected in a fully representative democratic election.",
                "William Shakespeare was an English playwright, poet, and actor, widely regarded as the greatest writer in the English language and the world's greatest dramatist. He is often called England's national poet and the 'Bard of Avon'. His extant works, including collaborations, consist of some 39 plays, 154 sonnets, two long narrative poems, and a few other verses.",
                "Leonardo da Vinci was an Italian polymath of the High Renaissance who was active as a painter, draughtsman, engineer, scientist, theoretician, sculptor, and architect. While his fame initially rested on his achievements as a painter, he also became known for his notebooks, in which he made drawings and notes on a variety of subjects.",
                "Isaac Newton was an English mathematician, physicist, astronomer, alchemist, theologian, and author who was described in his time as a natural philosopher. He is a key figure in the scientific revolution and is widely regarded as one of the most influential scientists of all time.",
                "Queen Elizabeth II was the Queen of the United Kingdom and other Commonwealth realms from 6 February 1952 until her death in 2022. Her reign of 70 years and 214 days was the longest of any British monarch and the second-longest recorded of any monarch of a sovereign country.",
                "Mahatma Gandhi was an Indian lawyer, anti-colonial nationalist, and political ethicist who employed nonviolent resistance to lead the successful campaign for India's independence from British Rule, and in turn inspired movements for civil rights and freedom across the world.",
                "Martin Luther King Jr. was an American Baptist minister and activist who became the most visible spokesman and leader in the Civil Rights Movement from 1955 until his assassination in 1968.",
                "Rosa Parks was an American activist in the civil rights movement best known for her pivotal role in the Montgomery bus boycott. The United States Congress has honored her as 'the first lady of civil rights' and 'the mother of the freedom movement'.",
                "Charles Darwin was an English naturalist, geologist and biologist, widely known for his contributions to evolutionary biology. His proposition that all species of life have descended over time from common ancestors is now widely accepted and considered a foundational concept in science.",
                "Jane Austen was an English novelist known primarily for her six major novels, which interpret, critique, and comment upon the British landed gentry at the end of the 18th century. Her works, including 'Pride and Prejudice' and 'Sense and Sensibility', are among the most widely read in English literature.",
                "Stephen Hawking was a British theoretical physicist, cosmologist, and author who was director of research at the Centre for Theoretical Cosmology at the University of Cambridge at the time of his death. He made significant contributions to our understanding of black holes and the origins of the universe.",
                "Ada Lovelace was an English mathematician and writer, chiefly known for her work on Charles Babbage's proposed mechanical general-purpose computer, the Analytical Engine. She was the first to recognize that the machine had applications beyond pure calculation, and published the first algorithm intended to be carried out by such a machine.",
                "Alan Turing was a British mathematician and computer scientist who is widely considered to be the father of theoretical computer science and artificial intelligence. He played a crucial role in cracking the Enigma code during World War II.",
                "Malala Yousafzai is a Pakistani activist for female education and a Nobel Peace Prize laureate. She is known for human rights advocacy, especially the education of women and children in her native Swat Valley in Khyber Pakhtunkhwa, northwest Pakistan, where the local Taliban had at times banned girls from attending school.",

                "Galileo Galilei was an Italian astronomer, physicist, and engineer, sometimes described as a polymath. Galileo has been called the 'father of observational astronomy', the 'father of modern physics', the 'father of the scientific method', and the 'father of modern science'.",
                "Cleopatra VII Philopator was the last active ruler of the Ptolemaic Kingdom of Egypt. As a member of the Ptolemaic dynasty, she was a descendant of its founder Ptolemy I Soter, a Macedonian Greek general and companion of Alexander the Great.",
                "Alexander the Great was a king of the ancient Greek kingdom of Macedon and a member of the Argead dynasty. He was born in Pella in 356 BC and succeeded his father Philip II to the throne in 336 BC at the age of 20.",
                "Confucius was a Chinese philosopher and politician of the Spring and Autumn period. The philosophy of Confucius emphasized personal and governmental morality, correctness of social relationships, justice, kindness, and sincerity.",
                "Socrates was a classical Greek philosopher who is credited as one of the founders of Western philosophy, and as being the first moral philosopher of the Western ethical tradition of thought.",
                "Plato was a classical Greek philosopher and founder of the Academy in Athens, the first institution of higher learning in the Western world. He is widely considered to be the most influential figure in Western philosophy.",

                "Julius Caesar was a Roman general and statesman who played a critical role in the events that led to the demise of the Roman Republic and the rise of the Roman Empire."

            bangla: [
                "আলবার্ট আইনস্টাইন একজন জার্মান বংশোদ্ভূত তাত্ত্বিক পদার্থবিদ ছিলেন যিনি আপেক্ষিকতার তত্ত্ব তৈরি করেছিলেন, যা আধুনিক পদার্থবিজ্ঞানের দুটি স্তম্ভের মধ্যে একটি। তার কাজ বিজ্ঞানের দর্শনেও প্রভাব ফেলেছিল। তিনি জনসাধারণের কাছে তার ভর-শক্তি সমীকরণ E = mc2 এর জন্য সবচেয়ে বেশি পরিচিত, যা 'বিশ্বের সবচেয়ে বিখ্যাত সমীকরণ' হিসাবে পরিচিত।",
                "মেরি কুরি একজন পোলিশ এবং ফরাসি পদার্থবিদ ও রসায়নবিদ ছিলেন যিনি তেজস্ক্রিয়তা নিয়ে অগ্রণী গবেষণা করেছিলেন। তিনি প্রথম মহিলা যিনি নোবেল পুরস্কার জিতেছিলেন, প্রথম ব্যক্তি এবং একমাত্র মহিলা যিনি দুবার নোবেল পুরস্কার জিতেছিলেন এবং দুটি ভিন্ন বৈজ্ঞানিক ক্ষেত্রে নোবেল পুরস্কার জেতা একমাত্র ব্যক্তি।",
                "নেলসন ম্যান্ডেলা একজন দক্ষিণ আফ্রিকার বর্ণবাদ বিরোধী বিপ্লবী, রাজনৈতিক নেতা এবং সমাজসেবী ছিলেন যিনি ১৯৯৪ থেকে ১৯৯৯ সাল পর্যন্ত দক্ষিণ আফ্রিকার প্রথম রাষ্ট্রপতি হিসাবে দায়িত্ব পালন করেন। তিনি দেশের প্রথম কৃষ্ণাঙ্গ রাষ্ট্রপ্রধান ছিলেন এবং সম্পূর্ণ প্রতিনিধিত্বমূলক গণতান্ত্রিক নির্বাচনে নির্বাচিত প্রথম ব্যক্তি।",

            loadPassages();
            resetTest();
            updatePageColor(); // Set initial page color
        });

        // Event Listeners
        languageSelect.addEventListener('change', loadPassages);
        timeSelect.addEventListener('change', resetTest);
        passageSelect.addEventListener('change', displaySelectedPassage);
        typingInput.addEventListener('keydown', handleKeyDown);
        typingInput.addEventListener('input', handleTypingInput);
        restartButton.addEventListener('click', resetTest);
        copyTypedTextButton.addEventListener('click', copyTypedText);
        backspaceToggle.addEventListener('change', toggleBackspace);
        autoscrollToggle.addEventListener('change', toggleAutoscroll);
        highlightToggle.addEventListener('change', toggleHighlight);
        pageColorRadios.forEach(radio => {
            radio.addEventListener('change', updatePageColor);
        });

        // Functions

        /**
         * Loads passages into the passage selection dropdown based on the selected language.
         */
        function loadPassages() {
            const selectedLanguage = languageSelect.value;
            const currentLanguagePassages = passages[selectedLanguage];
            passageSelect.innerHTML = ''; // Clear existing options

            currentLanguagePassages.forEach((passage, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `Passage ${index + 1}`;
                passageSelect.appendChild(option);
            });
            displaySelectedPassage(); // Display the first passage by default
        }

        /**
         * Displays the selected passage in the passage display area.
         */
        function displaySelectedPassage() {
            const selectedLanguage = languageSelect.value;
            const selectedPassageIndex = parseInt(passageSelect.value);
            currentPassage = passages[selectedLanguage][selectedPassageIndex];
            passageDisplay.textContent = currentPassage;
            passageWords = currentPassage.split(/\s+/); // Split passage into words for comparison
            resetTest(); // Reset test when a new passage is selected
        }

        /**
         * Handles keydown events for the typing input.
         * Used to control backspace functionality.
         * @param {KeyboardEvent} event - The keyboard event.
         */
        function handleKeyDown(event) {
            if (!backspaceToggle.checked && event.key === 'Backspace') {
                event.preventDefault(); // Prevent backspace if toggle is off
            }
        }

        /**
         * Handles input events for the typing input.
         * Starts the timer, updates WPM, and checks for errors.
         */
        function handleTypingInput() {
            if (!isTypingStarted) {
                startTest();
            }

            const typedText = typingInput.value;
            typedWords = typedText.split(/\s+/); // Split typed text into words

            updateMetrics(typedText);
            checkErrors(typedText);

            if (autoscrollToggle.checked) {
                // Scroll the typing input to keep the cursor visible
                typingInput.scrollTop = typingInput.scrollHeight;
            }

            // Check if all text is typed
            if (typedText === currentPassage) {
                endTest();
            }
        }

        /**
         * Starts the typing test: initializes timer and sets typing started flag.
         */
        function startTest() {
            isTypingStarted = true;
            startTypingMessage.classList.add('hidden'); // Hide the start message
            totalTime = parseInt(timeSelect.value) * 60; // Convert minutes to seconds
            timeLeft = totalTime;
            timerDisplay.textContent = formatTime(timeLeft);

            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = formatTime(timeLeft);

                // Timer flashing for the last 50 seconds
                if (timeLeft <= 50 && timeLeft > 0) {
                    timerDisplay.classList.add('timer-flashing');
                } else {
                    timerDisplay.classList.remove('timer-flashing');
                }

                if (timeLeft <= 0) {
                    endTest();
                }
            }, 1000);
        }

        /**
         * Ends the typing test: clears timer, disables input, and finalizes results.
         */
        function endTest() {
            clearInterval(timerInterval);
            isTypingStarted = false;
            typingInput.disabled = true;
            timerDisplay.classList.remove('timer-flashing'); // Ensure flashing stops

            // Final update of metrics
            const typedText = typingInput.value;
            updateMetrics(typedText);
            checkErrors(typedText);

            // Display a message that the test is over
            startTypingMessage.textContent = "Test Finished!";
            startTypingMessage.classList.remove('hidden');
            startTypingMessage.classList.add('text-green-700', 'font-bold');
        }

        /**
         * Resets the typing test to its initial state.
         */
        function resetTest() {
            clearInterval(timerInterval);
            isTypingStarted = false;
            typingInput.value = '';
            typingInput.disabled = false;
            timeLeft = parseInt(timeSelect.value) * 60;
            timerDisplay.textContent = formatTime(timeLeft);
            timerDisplay.classList.remove('timer-flashing');
            startTypingMessage.textContent = "You can start typing, the timer will begin when you press the first key.";
            startTypingMessage.classList.remove('hidden', 'text-green-700', 'font-bold');
            grossWPMDisplay.textContent = '0';
            netWPMDisplay.textContent = '0';
            wrongWordsDisplay.textContent = 'None';
            correctCharacters = 0;
            totalCharactersTyped = 0;
            wrongWords.clear();
            typedWords = [];
            passageDisplay.innerHTML = currentPassage; // Reset highlighting
        }

        /**
         * Formats time in seconds into MM:SS format.
         * @param {number} seconds - The time in seconds.
         * @returns {string} Formatted time string.
         */
        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${String(minutes).padStart(2, '0')}:${String(remainingSeconds).padStart(2, '0')}`;
        }

        /**
         * Updates Gross WPM and Net WPM.
         * Gross WPM: (Total characters / 5) / time elapsed in minutes.
         * Net WPM: (Correct characters / 5) / time elapsed in minutes.
         * @param {string} typedText - The text typed by the user.
         */
        function updateMetrics(typedText) {
            totalCharactersTyped = typedText.length;
            correctCharacters = 0;

            // Calculate correct characters
            for (let i = 0; i < typedText.length; i++) {
                if (typedText[i] === currentPassage[i]) {
                    correctCharacters++;
                }
            }

            const timeElapsedMinutes = (totalTime - timeLeft) / 60;
            if (timeElapsedMinutes > 0) {
                const grossWPM = Math.round((totalCharactersTyped / 5) / timeElapsedMinutes);
                const netWPM = Math.round((correctCharacters / 5) / timeElapsedMinutes);
                grossWPMDisplay.textContent = grossWPM;
                netWPMDisplay.textContent = netWPM;
            } else {
                grossWPMDisplay.textContent = '0';
                netWPMDisplay.textContent = '0';
            }
        }

        /**
         * Checks for wrong words and updates the display.
         * Highlights wrong words in the passage display if highlight toggle is on.
         * @param {string} typedText - The text typed by the user.
         */
        function checkErrors(typedText) {
            wrongWords.clear();
            let highlightedPassage = '';
            const passageChars = currentPassage.split('');
            const typedChars = typedText.split('');

            for (let i = 0; i < passageChars.length; i++) {
                if (i < typedChars.length) {
                    if (passageChars[i] === typedChars[i]) {
                        highlightedPassage += passageChars[i];
                    } else {
                        wrongWords.add(passageWords[getWordIndex(currentPassage, i)]); // Add the actual wrong word
                        if (highlightToggle.checked) {
                            highlightedPassage += `<span class="text-red-500 font-bold">${passageChars[i]}</span>`;
                        } else {
                            highlightedPassage += passageChars[i];
                        }
                    }
                } else {
                    highlightedPassage += passageChars[i];
                }
            }

            passageDisplay.innerHTML = highlightedPassage;

            if (wrongWords.size > 0) {
                wrongWordsDisplay.textContent = Array.from(wrongWords).join(', ');
            } else {
                wrongWordsDisplay.textContent = 'None';
            }
        }

        /**
         * Helper function to get the word index for a given character index in a passage.
         * @param {string} text - The full passage text.
         * @param {number} charIndex - The index of the character.
         * @returns {number} The index of the word containing the character.
         */
        function getWordIndex(text, charIndex) {
            const words = text.split(/\s+/);
            let currentLength = 0;
            for (let i = 0; i < words.length; i++) {
                currentLength += words[i].length;
                if (charIndex < currentLength) {
                    return i;
                }
                currentLength += 1; // For the space
            }
            return words.length - 1; // Fallback for last word
        }


        /**
         * Toggles the backspace functionality.
         */
        function toggleBackspace() {
            // The actual prevention is handled in handleKeyDown
            console.log('Backspace toggle:', backspaceToggle.checked ? 'On' : 'Off');
        }

        /**
         * Toggles the auto-scroll functionality.
         */
        function toggleAutoscroll() {
            // Logic handled in handleTypingInput
            console.log('Autoscroll toggle:', autoscrollToggle.checked ? 'On' : 'Off');
        }

        /**
         * Toggles the wrong word highlighting.
         */
        function toggleHighlight() {
            // Re-check errors to apply/remove highlighting immediately
            checkErrors(typingInput.value);
            console.log('Highlight toggle:', highlightToggle.checked ? 'On' : 'Off');
        }

        /**
         * Copies the user's typed text to the clipboard.
         * Uses document.execCommand('copy') for better iframe compatibility.
         */
        function copyTypedText() {
            typingInput.select();
            try {
                const successful = document.execCommand('copy');
                const msg = successful ? 'Copied to clipboard!' : 'Failed to copy.';
                // Display a temporary message to the user
                const messageBox = document.createElement('div');
                messageBox.textContent = msg;
                messageBox.className = 'fixed bottom-20 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg z-50 transition-opacity duration-300 opacity-0';
                document.body.appendChild(messageBox);
                setTimeout(() => {
                    messageBox.style.opacity = '1';
                }, 10); // Small delay to trigger transition
                setTimeout(() => {
                    messageBox.style.opacity = '0';
                    messageBox.addEventListener('transitionend', () => messageBox.remove());
                }, 2000);
            } catch (err) {
                console.error('Copy command failed:', err);
                // Fallback message for failure
                const messageBox = document.createElement('div');
                messageBox.textContent = 'Failed to copy text. Please try manually.';
                messageBox.className = 'fixed bottom-20 left-1/2 -translate-x-1/2 bg-red-600 text-white px-4 py-2 rounded-lg shadow-lg z-50 transition-opacity duration-300 opacity-0';
                document.body.appendChild(messageBox);
                setTimeout(() => {
                    messageBox.style.opacity = '1';
                }, 10);
                setTimeout(() => {
                    messageBox.style.opacity = '0';
                    messageBox.addEventListener('transitionend', () => messageBox.remove());
                }, 2000);
            }
        }

        /**
         * Updates the page background color based on selected radio button.
         */
        function updatePageColor() {
            const selectedColor = document.querySelector('input[name="page-color"]:checked').value;
            document.body.classList.remove('dark-mode', 'grey-mode'); // Remove existing modes

            if (selectedColor === 'dark') {
                document.body.classList.add('dark-mode');
            } else if (selectedColor === 'grey') {
                document.body.classList.add('grey-mode');
            } else {
                // Normal mode, default background color is applied via body style
                document.body.style.backgroundColor = '#63A169';
                document.body.style.color = '#1a202c'; // Default text color for normal mode
            }
        }

        // Initial load of passages
        loadPassages();
    </script>
</body>
</html>
