<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lekhoni Typing Practice</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body>
  <header>
    <h1>Lekhoni - টাইপিং অনুশীলন</h1>
  </header>

  <div class="container">
    <div class="sidebar">
      <h3>প্যাসেজ নির্বাচন করুন</h3>
      <select id="passageSelector"></select>

      <h3>PDF থেকে প্যাসেজ</h3>
      <input type="file" id="pdfInput" accept="application/pdf" />
      <textarea id="pdfText" placeholder="PDF থেকে প্যাসেজ এখানে দেখানো হবে" rows="4" readonly></textarea>

      <h3>নিজস্ব প্যাসেজ</h3>
      <textarea id="customPassage" placeholder="আপনার নিজের প্যাসেজ লিখুন বা পেস্ট করুন" rows="4"></textarea>
      <button onclick="loadCustomPassage()">লোড করুন</button>

      <div class="toggle">
        <label><input type="checkbox" id="allowBackspace" checked> ব্যাকস্পেস অনুমোদিত</label><br>
        <label><input type="checkbox" id="highlightToggle" checked> ভুল শব্দ হাইলাইট</label><br>
        <label><input type="checkbox" id="autoScroll" checked> অটো স্ক্রল</label>
      </div>

      <h3>সময় নির্বাচন (সেকেন্ডে)</h3>
      <input type="number" id="timeLimit" value="60" min="10" step="10" />

      <button onclick="startTest()">পরীক্ষা শুরু করুন</button>
    </div>

    <div class="main">
      <div class="timer">Time: <span id="timeLeft">0</span> sec</div>

      <h2>টাইপ করুন</h2>
      <div class="passage-box" id="passageDisplay"></div>
      <textarea class="typing-box" id="typingInput" placeholder="এখানে টাইপ করুন..." disabled></textarea>

      <div class="options">
        <button onclick="checkResult()">ফলাফল দেখুন</button>
        <button onclick="resetTest()">রিসেট</button>
      </div>

      <div id="results" class="hidden">
        <p>মোট শব্দ: <span id="totalWords"></span></p>
        <p>সঠিক শব্দ: <span id="correctWords"></span></p>
        <p>ভুল শব্দ: <span id="wrongWords"></span></p>
        <p>স্পীড (WPM): <span id="wpm"></span></p>
      </div>

      <div class="complaint-box">
        <h3>অভিযোগ / পরামর্শ</h3>
        <textarea placeholder="আপনার মতামত লিখুন..." rows="3"></textarea><br>
        <button>জমা দিন</button>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 Lekhoni. Developed with ❤️</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
